              //              alert(this.content + this.name + this.imgUrl + this.type);

                      // url

                          xuehao: localStorage.getItem("xuehao"),

                      }),
                      // result 为请求的返回结果对象
                      success: function(result) {
                        alert('更改成功!');

                      error: function(res) {

    function PerRefresh() {
        document.getElementById("xing").innerHTML = localStorage.getItem("mymyname");
        document.getElementById("shenfen").innerHTML = localStorage.getItem("myname");
    }
    //上传图片

    function showAction() {
        api.actionSheet({
            title: '上传图片',
            cancelTitle: '取消',
            buttons: ['从手机相册选择']
        }, function(ret, err) {
            if (ret) {
                getPicture(ret.buttonIndex);
            }
        });
    }

    function getPicture(sourceType) {
        if (sourceType == 1) { // 从相机中选择
            api.getPicture({
                sourceType: 'library',
                encodingType: 'jpg',
                mediaValue: 'pic',
                destinationType: 'base64',
                quality: 50,
                targetWidth: 750,
                targetHeight: 750
            }, function(ret, err) {
                if (ret) {
                    // $('#imgUp').attr('src', ret.base64Data)
                    var aa = ret.base64Data;
                    app.myImgUrl = aa;
                    $('#imgUp').attr('src', app.imgUrl);
                    if (app.myImgUrl == '' ) {
                        alert('上传头像失败');
                    } else {
                        $.ajax({
                            // 请求方式
                            type: "post",
                            // contentType

                            // dataType
                            dataType: "json",
                            // url
                            url: 'http://175.24.3.72/bangbang/geren.php',
                            // 把JS的对象或数组序列化一个json 字符串
                            data: JSON.stringify({
                                xuehao: localStorage.getItem("xuehao"),
                                myImgUrl: app.myImgUrl,
                            }),
                            // result 为请求的返回结果对象
                            success: function(result) {
                              alert('你的头像焕然一新啦');
                              localStorage.setItem('myImgUrl',IP+result.substr(1));
                            },
                            error: function(res) {
                                alert(res);
                                console.log(res);
                                alert('网络发生错误!');
                            }
                        });
                    }
                } else {
                    alert(JSON.stringify(err));
                }
            });
        } else {}
    }

    function openImg() {
        var UIAlbumBrowser = api.require('UIAlbumBrowser');
        UIAlbumBrowser.open({
            max: 1,
            type: image,
            styles: {
                bg: '#fff',
                mark: {
                    icon: '',
                    position: 'bottom_left',
                    size: 20
                },
                nav: {
                    bg: 'rgba(0,0,0,0.6)',
                    titleColor: '#fff',
                    titleSize: 18,
                    cancelColor: '#fff',
                    cancelSize: 16,
                    finishColor: '#fff',
                    finishSize: 16
                }
            },
            rotation: true
        }, function(ret) {
            if (ret) {
                alert(JSON.stringify(ret));
            }
        });
