    function recognitionLight() {


        api.actionSheet({
            title: '上传图片',
            cancelTitle: '取消',
            buttons: ['从手机相册选择']
        }, function(ret, err) {
            if (ret) {
                getPicture(ret.buttonIndex);
            }
        });
    }

    function getPicture(sourceType) {
        if (sourceType == 1) { // 从相机中选择
            api.getPicture({
                sourceType: 'library',
                encodingType: 'jpg',
                mediaValue: 'pic',
                destinationType: 'base64',
                quality: 50,
                targetWidth: 750,
                targetHeight: 750
            }, function(ret, err) {
                if (ret) {
                    // $('#imgUp').attr('src', ret.base64Data)
                    var aa = ret.base64Data;
                    app.imgUrl = aa;

                    if (app.imgUrl =='') {
                      //  alert('未上传车标图片!');
                    } else {
                        alert("正在识别中......");
                      localStorage.setItem("myRecognitionImg",app.imgUrl);
                        $.ajax({
                            // 请求方式
                            type: "post",
                            // contentType

                            // dataType
                            dataType: "json",
                            // url
                            url: 'http://49.233.79.42:7777/predict',
                            // 把JS的对象或数组序列化一个json 字符串
                            data: JSON.stringify({
                                imgUrl: app.imgUrl,
                            }),
                            // result 为请求的返回结果对象
                            success: function(result) {
                              console.log(result);
                              localStorage.setItem("myRecognitionName",result['res'][0]);

                              api.openWin({
                                  name: 'recognition',
                                  url: 'recognition.html',
                              });
                              //document.getElementById("myResult").innerHTML=result['res'][0];
                              //alert('上传成功!');
                            },
                            error: function(res) {
                                alert(res);
                                console.log(res);
                                alert('网络发生错误!');
                            }
                        });
                    }
                } else {
                    alert(JSON.stringify(err));
                }
            });
        } else {}

    //jquery下拉加载更多
    $(function() {
        var loadFlag = false;
        var _stary, _endy;
        $(".container").on("touchend", function() {
            $(".container").stop().animate({
                top: 0
            }, 80);
            if ($(this).height() + $(this).scrollTop() >= $(".container ul").height() && !loadFlag) {
                loadFlag = true;
                $(".loadmore").addClass("show");
                $(this).scrollTop(100000000000);
                itemNum = itemNum + 8;
                $.ajax({
                    // 请求方式
                    type: "post",
                    // contentType
                    // dataType
                    dataType: "json",
                    // url
                    url: 'http://' + IP + '/loadMoreImg.php',
                    // 把JS的对象或数组序列化一个json 字符串
                    // result 为请求的返回结果对象
                    data: JSON.stringify({
                        type: localStorage.getItem("currentType"),
                        itemNum: itemNum,
                    }),
                    success: function(result) {

                        if (result[0]["jieguo"] == '空') {
                          //  alert('没有更多消息啦');

                        } else {
                            for (var k = 0; k < result.length; k++) {
                                var item = {
                                    imgId: result[k].imgId,
                                    src: 'http://' + IP + result[k].imgUrl,
                                    task: result[k].title
                                };
                                self.list.push(item);

                            }
                            //api.refreshHeaderLoadDone();
                        }
                        //  dropload.resetload();
                    },
                    error: function(res) {
                        //dropload.resetload();
                        console.log(res);
                        alert('网络发生错误!');
                    }
                });
                setTimeout(function() {
                    loadFlag = false;
                }, 1000);
            }
        });
        $(".container").on("touchstart", function(e) {
            var _touch = e.originalEvent.targetTouches[0];
            _stary = _touch.pageY;
        });
        $(".container").on("touchmove", function(e) {
            var _touch = e.originalEvent.targetTouches[0];
            _endy = _touch.pageY;
            if ($(this).height() + $(this).scrollTop() >= $(".container ul").height()) {
                var current_y = _endy - _stary;
                $(".container").animate({
                    top: current_y / 3
                }, 5);
            }
        });
    });
