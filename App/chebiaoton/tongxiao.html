<!DOCTYPE html>
<html class="um landscape min-width-240px min-width-320px min-width-480px min-width-768px min-width-1024px">

<head>
    <title></title>
    <meta charset="utf-8">
    <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, initial-scale=1, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link rel="stylesheet" href="css/fonts/font-awesome.min.css">
    <link rel="stylesheet" href="css/aui.css">
    <script src="js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue"></script>
    <style type="text/css">
        html,
        body {
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        #hea{
          position: fixed !important;
          top:0rem !important;
          z-index: 2 !important;
          background-color: white !important;
          height: 4.8rem !important;
          width:100% !important;
        }
        #qbody{
          margin-top: 4.8rem !important;
        }
        html,
        body,
        div,
        ul,
        li,
        img,
        p {
            padding: 0;
            margin: 0;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: white;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            box-sizing: border-box;
            --webkit-box-sizing: border-box;
        }

        .loadmore {
            text-align: center;
            height: 0px;
            line-height: 30px;
            background-color: white;
            display: none;
            transition: height 1s;
            -moz-transition: height 1s;
            /* Firefox 4 */
            -webkit-transition: height 1s;
            /* Safari 和 Chrome */
            -o-transition: height 1s;
            /* Opera */
        }

        .loadmore.show {
            display: block;
            height: 30px;
        }

        .white {
            background: white;
        }

        .line {
            box-shadow: 0px 0px 10px 0.5px rgba(0, 0, 255, .2);
        }

        .mtop {
            margin-top: 0.3rem;
        }

        .slideCenter {
            padding-top: 2rem;
            width: 300px;
            text-align: center;
            margin: auto auto
        }

        .box {
            display: -webkit-flex;
            display: flex;
            width: 100%;
            justify-content: flex-start;
            flex-flow: row wrap;
            align-items: center;
            margin-top: 0.5rem;
        }

        .box div {
            padding-left: 0.5rem;
            padding-right: 0.5rem;
            margin-right: 1rem;
            -moz-border-radius: 15px;
            /* Firefox */
            -webkit-border-radius: 15px;
            /* Safari 和 Chrome */
            background: red;
            background: #fff;
            margin-left: -1px;
            position: relative;
        }

        .box div::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0px;
            right: 0px;
            bottom: 0px;
            border: 1px solid #fff;
        }

        .xiaoluBox {
            display: -webkit-flex;
            display: flex;
            width: 100%;
            justify-content: flex-start;
            flex-flow: row wrap;
            align-items: center;
            margin-top: 0.5rem;
        }

        .xiaoluBox div {
            padding-left: 0.5rem;
            padding-right: 0.5rem;
            margin-right: 0.3rem;
            -moz-border-radius: 15px;
            /* Firefox */
            -webkit-border-radius: 15px;
            /* Safari 和 Chrome */
            background: red;
            background: #fff;
            margin-left: -1px;
            position: relative;
        }

        .xiaoluBox div::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0px;
            right: 0px;
            bottom: 0px;
            border: 1px solid #fff;
        }

        .tabActive {
            border-radius: 10%;
            background-color: black !important;
            color: white !important;
        }
    </style>

</head>

<body class="um-vp bc-bg white" ontouchstart>
    <div id="app">

        <div id="header" class="aui-row aui-row-padded">
            <div class="aui-tabG">
                <div class="aui-col-xs-2" style="margin-left:1rem" onclick="firqiehuan1()">
                    <div id="firheader1" class="aui-tab-itemG tapmode">发现</div>
                </div>
                <div class="aui-col-xs-2" onclick="firqiehuan2()">
                    <div id="firheader2" class="aui-tab-itemG tapmode  aui-active">同校</div>
                </div>
                <div class="aui-col-xs-2" onclick="firqiehuan3()">
                    <div id="firheader3" class="aui-tab-itemG tapmode">小路</div>
                </div>
            </div>
        </div>

            <div class="aui-card-list" style="margin-top:1rem">
              <div>
                <div class="aui-card-list-header">
                    学校悬赏"任务"
                </div>
                <div class="aui-card-list-header" style="margin-top:-1rem;">
                    <p style="color:black">为你推荐近期学校悬赏</p>
                </div>
                <div class="container">
                    <ul>
                        <div>
                            <div class="aui-row" style="flex-wrap: wrap !important;display:flex;justify-content:center;">
                                <ul>
                                    <li v-for="(item,i) in list">
                                        <div class="aui-col-xs-6">
                                            <div class="aui-row aui-row-padded" style="width:75%;height:5rem;margin-left:0.7rem" @click="getTongjiling(item.imgId)">
                                                <img :src="item.src" height="100%" width="100%" />
                                            </div>
                                            <div :id="item.imgId" class="aui-row aui-row-padded" style="text-align:center;margin-top:0.6rem">
                                                {{item.task}}
                                            </div>
                                        </div>
                                    </li>
                                </ul>


                            </div>

                        </div>
                    </ul>

                </div>


            </div>
        </div>


</body>

<script src="js/jquery-1.9.1.min.js"></script>
<script src="js/jquery.hDialog.min.js"></script>

<script>

    var self, currentType;
    var IP = '49.233.79.42/pyCar/php';
    var itemNum = 4;
    localStorage.setItem("currentType", "学校");

    //tab导航栏1
    function firqiehuan1() {
        $("#firheader1").attr("class", "aui-tab-itemG tapmode aui-active");
        $("#firheader2").attr("class", "aui-tab-itemG");
        $("#firheader3").attr("class", "aui-tab-itemG");
        self.status = '发现';
        api.openWin({
            name: 'xiaoyuantong2',
            url: 'xiaoyuantong2.html',
        });
        $("#firheader1").attr("class", "aui-tab-itemG");
        $("#firheader2").attr("class", "aui-tab-itemG  tapmode aui-active");
        $("#firheader3").attr("class", "aui-tab-itemG");
    }

    function firqiehuan2() {
        $("#firheader1").attr("class", "aui-tab-itemG");
        $("#firheader2").attr("class", "aui-tab-itemG tapmode aui-active");
        $("#firheader3").attr("class", "aui-tab-itemG");
        self.status = '同校';
        location.reload();
    }

    function firqiehuan3() {

        $("#firheader1").attr("class", "aui-tab-itemG");
        $("#firheader2").attr("class", "aui-tab-itemG");
        $("#firheader3").attr("class", "aui-tab-itemG tapmode aui-active");
        api.openWin({
            name: 'xiaolu2',
            url: 'xiaolu2.html',
        });
        $("#firheader1").attr("class", "aui-tab-itemG");
        $("#firheader2").attr("class", "aui-tab-itemG  tapmode aui-active");
        $("#firheader3").attr("class", "aui-tab-itemG");
    }
    var app = new Vue({
        el: '#app',
        data: {
            list: [],
            type1: '电脑',
            type2: '电动车',
            type3: '电子',
            type4: '其他',
            status: '同校',
        },
        mounted: function() {
            self = this;
            self.status = '发现';
            status_update();
        },
        methods: {
            getTongjiling: function(imgId) {

                localStorage.setItem("currentimgId", imgId);

                api.openWin({
                    name: 'xuexiaotongjiling',
                    url: 'xuexiaotongjiling.html',
                });
            }
        }
    });

    function bangbang() {
        api.openWin({
            name: 'fabiao',
            url: './fabiao.html',
        });
    }


    //tab2导航栏
    function qiehuan1() {
        itemNum = 4;
        localStorage.setItem('currentType', self.type1);
        $("#header1").attr("class", "tabActive");
        $("#header2").attr("class", "");
        $("#header3").attr("class", "");
        $("#header4").attr("class", "");
        status_update();
    }

    function qiehuan2() {
        itemNum = 4;
        localStorage.setItem('currentType', self.type2);
        $("#header1").attr("class", "");
        $("#header2").attr("class", "tabActive");
        $("#header3").attr("class", "");
        $("#header4").attr("class", "");
        status_update();
    }

    function qiehuan3() {
        itemNum = 4;
        localStorage.setItem('currentType', self.type3);
        $("#header1").attr("class", "");
        $("#header2").attr("class", "");
        $("#header3").attr("class", "tabActive");
        $("#header4").attr("class", "");
        status_update();
    }

    function qiehuan4() {
        itemNum = 4;
        localStorage.setItem('currentType', self.type4);
        $("#header1").attr("class", "");
        $("#header2").attr("class", "");
        $("#header3").attr("class", "");
        $("#header4").attr("class", "tabActive");
        status_update();
    }
    //更新状态
    function status_update() {
        self.list = [];
        $.ajax({
            // 请求方式
            type: "post",
            // contentType

            // dataType
            dataType: "json",
            // url
            url: 'http://' + IP + '/indexImg.php',
            // 把JS的对象或数组序列化一个json 字符串
            // result 为请求的返回结果对象
            data: JSON.stringify({
                type: localStorage.getItem("currentType"),
            }),
            success: function(result) {
                console.log(result);
                for (var k = 0; k < result.length; k++) {
                    var item = {
                        imgId: result[k].imgId,
                        src: 'http://' + IP + result[k].imgUrl,
                        task: result[k].title
                    };
                    self.list.push(item);

                }
            },
            error: function(res) {
                console.log(res);
                alert('网络发生错误!');
            }
        });
    }
    //轮播图
    function currentFun(index) {
        console.log(index);
    }


    function ok() {
        api.openWin({
            name: 'geren2_content',
            url: './geren2_content.html',
            pageParam: {
                name: 'test'
            }
        });
    }

    function jin() {
        api.openWin({
            name: 'qingjia',
            url: 'qingjia.html',
            pageParam: {
                name: 'test'
            }
        });
    }

    function tui() {
        api.openWin({
            name: 'tui',
            url: 'tuijian.html',
            pageParam: {
                name: 'test'
            }
        });

    }
    //jquery下拉加载更多


    function req() {
        itemNum = itemNum + 8;
        $.ajax({
            // 请求方式
            type: "post",
            // contentType
            // dataType
            dataType: "json",
            // url
            url: 'http://' + IP + '/loadMoreImg.php',
            // 把JS的对象或数组序列化一个json 字符串
            // result 为请求的返回结果对象
            data: JSON.stringify({
                type: localStorage.getItem("currentType"),
                itemNum: itemNum,
            }),
            success: function(result) {
                if (result[0]["jieguo"] == '空') {
                    //alert('没有更多消息啦');
                } else {
                    for (var k = 0; k < result.length; k++) {
                        var item = {
                            imgId: result[k].imgId,
                            src: 'http://' + IP + result[k].imgUrl,
                            task: result[k].title
                        };
                        self.list.push(item);
                        alert('加载成功!');
                        //  api.refreshHeaderLoadDone();
                    }
                }
            },
            error: function(res) {
                console.log(res);
                alert('网络发生错误!');
            }
        });

    }

    function xqiehuan5() {
        itemNum = 4;
        localStorage.setItem('currentType', self.xtype5);
        $("#header1").attr("class", "");
        $("#header2").attr("class", "");
        $("#header3").attr("class", "");
        $("#header4").attr("class", "");
        $("#header4").attr("class", "tabActive");
        status_update();
    }

</script>

</html>
