    <style type="text/css">
        html,
        body {
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        html,
        body,
        div,
        ul,
        li,
        img,
        p {
            padding: 0;
            margin: 0;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: white;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            box-sizing: border-box;
            --webkit-box-sizing: border-box;
        }

        .loadmore {
            text-align: center;
            height: 0px;
            line-height: 30px;
            background-color: white;
            display: none;
            transition: height 1s;
            -moz-transition: height 1s;
            /* Firefox 4 */
            -webkit-transition: height 1s;
            /* Safari 和 Chrome */
            -o-transition: height 1s;
            /* Opera */
        }

        .loadmore.show {
            display: block;
            height: 30px;
        }

        .white {
            background: white;
        }

        .line {
            box-shadow: 0px 0px 10px 0.5px rgba(0, 0, 255, .2);
        }

        .mtop {
            margin-top: 0.3rem;
        }

        .slideCenter {
            padding-top: 2rem;
            width: 300px;
            text-align: center;
            margin: auto auto
        }

        .box {
            display: -webkit-flex;
            display: flex;
            width: 100%;
            justify-content: flex-start;
            flex-flow: row wrap;
            align-items: center;
            margin-top: 0.5rem;
        }

        .box div {
            padding-left: 0.5rem;
            padding-right: 0.5rem;
            margin-right: 1rem;
            -moz-border-radius: 15px;
            /* Firefox */
            -webkit-border-radius: 15px;
            /* Safari 和 Chrome */
            background: red;
            background: #fff;
            margin-left: -1px;
            position: relative;
        }

        .box div::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0px;
            right: 0px;
            bottom: 0px;
            border: 1px solid #fff;
        }

        .xiaoluBox {
            display: -webkit-flex;
            display: flex;
            width: 100%;
            justify-content: flex-start;
            flex-flow: row wrap;
            align-items: center;
            margin-top: 0.5rem;
        }

        .xiaoluBox div {
            padding-left: 0.5rem;
            padding-right: 0.5rem;
            margin-right: 0.3rem;
            -moz-border-radius: 15px;
            /* Firefox */
            -webkit-border-radius: 15px;
            /* Safari 和 Chrome */
            background: red;
            background: #fff;
            margin-left: -1px;
            position: relative;
        }

        .xiaoluBox div::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0px;
            right: 0px;
            bottom: 0px;
            border: 1px solid #fff;
        }

        .tabActive {
            border-radius: 10%;
            background-color: black !important;
            color: white !important;
        }
    </style>

</head>

    //更新状态
    function status_update() {
        self.list = [];
        $.ajax({
            // 请求方式
            type: "post",
            // contentType

            // dataType
            dataType: "json",
            // url
            url: 'http://' + IP + '/indexImg.php',
            // 把JS的对象或数组序列化一个json 字符串
            // result 为请求的返回结果对象
            data: JSON.stringify({
                type: localStorage.getItem("currentType"),
            }),
            success: function(result) {
                console.log(result);
                for (var k = 0; k < result.length; k++) {
                    var item = {
                        imgId: result[k].imgId,
                        src: 'http://' + IP + result[k].imgUrl,
                        task: result[k].title
                    };
                    self.list.push(item);

                }
            },
            error: function(res) {

    //jquery下拉加载更多
    $(function() {
        var loadFlag = false;
        var _stary, _endy;
        $(".container").on("touchend", function() {
            $(".container").stop().animate({
                top: 0
            }, 80);
            if ($(this).height() + $(this).scrollTop() >= $(".container ul").height() && !loadFlag) {
                loadFlag = true;
                $(".loadmore").addClass("show");
                $(this).scrollTop(100000000000);
                itemNum = itemNum + 8;
                $.ajax({
                    // 请求方式
                    type: "post",
                    // contentType
                    // dataType
                    dataType: "json",
                    // url
                    url: 'http://' + IP + '/loadMoreImg.php',
                    // 把JS的对象或数组序列化一个json 字符串
                    // result 为请求的返回结果对象
                    data: JSON.stringify({
                        type: localStorage.getItem("currentType"),
                        itemNum: itemNum,
                    }),
                    success: function(result) {

                        if (result[0]["jieguo"] == '空') {
                          //  alert('没有更多消息啦');

                        } else {
                            for (var k = 0; k < result.length; k++) {
                                var item = {
                                    imgId: result[k].imgId,
                                    src: 'http://' + IP + result[k].imgUrl,
                                    task: result[k].title
                                };
                                self.list.push(item);

                            }
                            //api.refreshHeaderLoadDone();
                        }
                        //  dropload.resetload();
                    },
                    error: function(res) {
                        //dropload.resetload();
                        console.log(res);
                        alert('网络发生错误!');
                    }
                });
                setTimeout(function() {
                    loadFlag = false;
                }, 1000);
            }
        });
        $(".container").on("touchstart", function(e) {
            var _touch = e.originalEvent.targetTouches[0];
            _stary = _touch.pageY;
        });
        $(".container").on("touchmove", function(e) {
            var _touch = e.originalEvent.targetTouches[0];
            _endy = _touch.pageY;
            if ($(this).height() + $(this).scrollTop() >= $(".container ul").height()) {
                var current_y = _endy - _stary;
                $(".container").animate({
                    top: current_y / 3
                }, 5);
            }
        });
    });

    function req() {
        itemNum = itemNum + 8;
        $.ajax({
            // 请求方式

            data: JSON.stringify({

                if (result[0]["jieguo"] == '空') {
                  //  alert('没有更多消息啦');
                } else {
                    for (var k = 0; k < result.length; k++) {

                            task: result[k].title
                        };
                        self.list.push(item);
                        alert('加载成功!');
                        //  api.refreshHeaderLoadDone();
                    }
                }
            },
            error: function(res) {
                console.log(res);
                alert('网络发生错误!');
            }
        });

    }
